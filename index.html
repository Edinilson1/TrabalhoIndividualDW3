<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário</title>
</head>
<body>
    <div class="container">
        <div class="caixa">
            <p class="titulo">Formulário</p>
            <form>
                <div class="group">
                    <label>Nome:</label>
                    <input type="text" placeholder="Ex: Edinilson Santos Silva Filho" id="nome">
                </div>
                <div class="group">
                    <label>Data de Nascimento:</label>
                    <input type="date" id="data">
                </div>
                <div class="group">
                    <label>Foto:</label>
                    <input type="file" id="foto">
                </div>
                <div class="group">
                    <label for="profissão">Profissão:</label>
                    <input type="text" placeholder="Ex: Programador" name="profissão" id="profissao">
                </div>
                <span class="invisivel" id="aviso">Preencha todos os campos</span>
                <button type="submit">Enviar</button>
            </form>
            <div class="cards" id="cards">

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
